
# Project
project:
  name: "Sentiment Analyzer"
  version: "1.0.0"

# Data
data:
  raw_path: "data/raw/reviews.csv"
  processed_path: "data/processed/clean_reviews.csv"
  test_size: 0.2
  random_state: 42

# Features
features:
  max_features: 10000
  ngram_range: [1, 3]
  vectorizer_path: "models/vectorizer.pkl"

# Model
model:
  max_iter: 1000
  random_state: 42
  save_path: "models/sentiment_model.pkl"

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"